<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>企业级 RAG 对话台 V2</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.4/marked.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#10b981',
            primaryDeep: '#059669',
            surface: '#f8fafc',
            line: '#e2e8f0',
            textMain: '#0f172a',
            textMuted: '#64748b'
          }
        }
      }
    };
  </script>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-strong: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --textMain: #0f172a;
      --textMuted: #64748b;
      --muted: #64748b;
      --primary: #10b981;
      --primary-deep: #059669;
      --primaryDeep: #059669;
      --primary-soft: #ecfdf5;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    h1, h2, h3 {
      font-family: "Manrope", "Inter", sans-serif;
    }

    .hidden {
      display: none !important;
    }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      letter-spacing: normal;
      text-transform: none;
      white-space: nowrap;
      direction: ltr;
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
      line-height: 1 !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      vertical-align: middle;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: 'liga';
      min-width: 1em;
      min-height: 1em;
    }

    body:not(.icons-ready) .material-symbols-outlined {
      color: transparent !important;
      opacity: 0;
    }

    /* Chat specific styles */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: color-mix(in srgb, var(--primary-soft) 18%, white);
      border-right: 1px solid #e5e7eb;
      padding: 20px 16px;
      transition: width 0.3s, padding 0.3s;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sidebar.collapsed {
      width: 0;
      padding: 20px 0;
      border: none;
    }

    .session-group {
      margin-top: 16px;
    }

    .session-group-label {
      padding: 0 8px;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 800;
      color: var(--textMuted);
    }

    .session-item {
      width: 100%;
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .session-item:hover {
      background: color-mix(in srgb, var(--primary-soft) 74%, white);
      border-color: color-mix(in srgb, var(--primary) 22%, white);
    }

    .session-item.active {
      background: color-mix(in srgb, var(--primary-soft) 82%, white);
      border-color: color-mix(in srgb, var(--primary) 42%, white);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), inset 0 0 0 1px color-mix(in srgb, var(--primary) 14%, transparent);
    }

    .session-item-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--textMain);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-item-time {
      margin-top: 4px;
      font-size: 11px;
      color: var(--textMuted);
    }

    .session-item.active .session-item-title {
      color: var(--primary-deep);
    }

    .sidebar-bottom {
      margin-top: auto;
      padding-top: 18px;
    }

    #new-chat-btn {
      background: color-mix(in srgb, var(--primary-soft) 62%, white);
      border-color: color-mix(in srgb, var(--primary) 30%, white);
      color: var(--primary-deep);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
    }

    #new-chat-btn:hover {
      background: color-mix(in srgb, var(--primary-soft) 78%, white);
      border-color: color-mix(in srgb, var(--primary) 42%, white);
    }

    .sidebar-logout {
      width: 100%;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--danger);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .sidebar-logout:hover {
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      border-color: color-mix(in srgb, var(--danger) 30%, white);
    }

    .main-content {
      flex: 1;
      padding: 0;
      min-width: 0;
      height: 100vh;
      overflow-y: auto;
      background: #ffffff;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 40px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar .toggle-btn {
      padding: 8px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid var(--line);
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .topbar .toggle-btn:hover {
      background: #f8fafc;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0;
    }

    .message-board {
      flex: 1;
      overflow-y: auto;
      padding: 40px 80px;
      display: grid;
      gap: 20px;
      align-content: start;
    }

    .empty-panel {
      padding: 60px 40px;
      text-align: center;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #ffffff;
      box-shadow: var(--shadow);
      margin: 40px auto;
      max-width: 600px;
    }

    .empty-panel h2 {
      font-size: 28px;
      margin-bottom: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .empty-panel p {
      max-width: 480px;
      margin: 0 auto;
      color: var(--textMuted);
      line-height: 1.8;
      font-size: 14px;
    }

    .agent-portal {
      max-width: 980px;
      margin: 0 auto;
      padding: 12px 0 8px;
    }

    .agent-portal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .agent-portal-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, color-mix(in srgb, var(--primary-soft) 55%, white) 100%);
      padding: 20px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
      text-align: left;
    }

    .agent-portal-card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--primary) 38%, white);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
    }

    .agent-portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--primary-soft) 82%, white);
      color: var(--primary-deep);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .message-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      max-width: 600px;
      margin: 0 auto;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.user .avatar {
      order: 2;
    }

    .message-row.user .bubble {
      order: 1;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      color: #64748b;
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .message-row.user .avatar {
      background: var(--primary);
      color: white;
    }

    .message-row.assistant .avatar {
      background: #e2e8f0;
      color: #475569;
    }

    .bubble {
      max-width: min(450px, 80%);
      border-radius: 18px;
      padding: 12px 16px;
      background: #f8fafc;
      line-height: 1.6;
      font-size: 14px;
      position: relative;
    }

    .message-row.user .bubble {
      background: var(--primary);
      color: white;
    }

    .message-row.assistant .bubble {
      border-top-left-radius: 6px;
      border-bottom-right-radius: 18px;
    }

    .message-row.user .bubble {
      border-top-right-radius: 6px;
      border-bottom-left-radius: 18px;
    }

    .typing {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--primary);
      animation: blink 1.2s infinite;
      opacity: 0.3;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; }
      40% { opacity: 1; }
    }

    .composer {
      position: sticky;
      bottom: 0;
      z-index: 8;
      padding: 24px 80px;
      background: #ffffff;
      border-top: 1px solid var(--line);
    }

    .composer-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #ffffff;
      box-shadow: var(--shadow);
      max-width: 800px;
      margin: 0 auto;
    }

    textarea, input {
      width: 100%;
      border: none;
      border-radius: 0;
      padding: 12px;
      font: inherit;
      color: var(--textMain);
      background: transparent;
      outline: none;
    }

    textarea {
      min-height: 80px;
      max-height: 200px;
      resize: vertical;
      line-height: 1.7;
      font-size: 14px;
    }

    .send-btn, .primary-btn, .ghost-btn {
      border: none;
      cursor: pointer;
      font: inherit;
      transition: all 0.2s ease;
    }

    .send-btn, .primary-btn {
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: 600;
      align-self: flex-end;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .send-btn:hover { 
      background: var(--primaryDeep);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .send-btn { 
      min-width: 100px;
      font-size: 14px;
      font-weight: 600;
    }

    .ghost-btn {
      width: 100%;
      margin-top: 12px;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--textMain);
      font-weight: 600;
    }

    .ghost-btn:hover { 
      background: #f8fafc;
    }

    /* Recommended questions styles */
    .question-chip {
      padding: 6px 12px;
      border: 1px solid color-mix(in srgb, var(--primary) 20%, white);
      background: color-mix(in srgb, var(--primary) 8%, white);
      color: var(--primary);
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .question-chip:hover {
      background: color-mix(in srgb, var(--primary) 14%, white);
      border-color: color-mix(in srgb, var(--primary) 38%, white);
    }

    .send-btn:disabled, .primary-btn:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
    }

    .prose {
      line-height: 1.6;
    }

    .prose p {
      margin: 8px 0;
    }

    .prose strong {
      color: var(--primary-deep);
    }

    .message-row.user .prose strong {
      color: rgba(255, 255, 255, 0.9);
    }

    .prose ul, .prose ol {
      padding-left: 1.5em;
      margin: 8px 0;
    }

    .prose li {
      margin: 4px 0;
    }

    .prose code {
      background: rgba(255, 255, 255, 0.1);
      color: inherit;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    .message-row.assistant .prose code {
      background: #f1f5f9;
      color: var(--primary-deep);
    }

    .prose pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      font-size: 12px;
    }

    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 13px;
    }

    .prose th, .prose td {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 6px 10px;
      text-align: left;
    }

    .message-row.assistant .prose th, .message-row.assistant .prose td {
      border: 1px solid var(--line);
    }

    .message-row.user .prose a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: underline;
    }

    .message-row.assistant .prose a {
      color: var(--primary-deep);
      text-decoration: underline;
    }

    .cache-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.9);
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin-bottom: 8px;
    }

    .message-row.assistant .cache-badge {
      background: #ecfdf5;
      color: #059669;
      border: 1px solid #d1fae5;
    }

    .status-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .message-row.assistant .status-text {
      color: var(--textMuted);
    }

    .error-text { 
      color: var(--danger); 
    }

    .message-row.user .error-text { 
      color: #fca5a5; 
    }

    /* Custom Modal Styling */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      padding: 20px;
    }

    .modal-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      padding: 32px;
      transform: scale(0.95);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-backdrop.active .modal-content {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 19px;
      font-weight: 800;
      color: var(--textMain);
      letter-spacing: -0.02em;
    }

    .modal-body {
      font-size: 14px;
      line-height: 1.6;
      color: var(--textMuted);
      margin-bottom: 24px;
    }

    .modal-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 24px;
      outline: none;
      transition: all 0.2s ease;
    }

    .modal-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-cancel {
      background: #f1f5f9;
      color: var(--textMuted);
    }

    .btn-ok {
      background: var(--primary);
      color: white;
    }

    .btn-ok:hover {
      background: var(--primaryDeep);
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        z-index: 100;
        transform: translateX(-100%);
        width: 240px;
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .message-board {
        padding: 20px 12px;
      }

      .composer {
        padding: 12px;
      }

      .topbar {
        padding: 12px 16px;
      }

      .chat-messages {
        padding: 16px 12px;
      }

      .composer {
        padding: 12px;
      }

      .empty-panel {
        padding: 40px 20px;
        margin: 20px auto;
      }

      .empty-panel h2 {
        font-size: 24px;
      }

      .message-row {
        gap: 12px;
      }

      .bubble {
        max-width: min(500px, 85%);
        padding: 14px 18px;
      }

      .send-btn {
        min-width: 80px;
        padding: 8px 16px;
      }

      .header {
        padding: 12px 16px;
      }

      .chat-title {
        font-size: 18px;
      }

      .chat-tagline {
        font-size: 12px;
      }

      /* H5 Header优化 */
      #chat-screen > header {
        padding: 12px 16px;
      }

      #chat-sidebar-logo-shell {
        height: 36px !important;
        min-width: 36px !important;
      }

      #chat-sidebar-logo-image {
        max-width: 80px !important;
      }

      #chat-title {
        font-size: 13px;
      }

      #chat-tagline {
        font-size: 10px;
      }

      /* H5消息区域优化 */
      #chat-messages {
        padding: 16px 12px !important;
      }

      #chat-messages > div {
        max-width: 100%;
        padding: 0;
      }

      #chat-messages .bg-gray-50 {
        padding: 16px 12px;
      }

      #welcome-avatar {
        width: 32px !important;
        height: 32px !important;
      }

      #welcome-heading {
        font-size: 15px;
      }

      #welcome-message, #agent-description {
        font-size: 12px;
      }

      /* H5推荐问题优化 */
      .question-chip {
        padding: 8px 14px;
        font-size: 12px;
        white-space: normal;
        text-align: left;
        line-height: 1.4;
      }

      /* H5输入区域优化 */
      .composer-card {
        padding: 12px;
      }

      #chat-input {
        font-size: 15px !important; /* iOS需要16px以上避免缩放 */
        min-height: 60px !important;
      }

      .send-btn {
        min-width: 70px;
        padding: 10px 14px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      .sidebar {
        width: 220px;
      }

      .chat-messages {
        padding: 12px 8px;
      }

      .composer {
        padding: 8px;
      }

      .empty-panel {
        padding: 30px 16px;
        margin: 16px auto;
      }

      .empty-panel h2 {
        font-size: 20px;
      }

      .bubble {
        max-width: min(400px, 90%);
        padding: 12px 16px;
        font-size: 13px;
      }

      .send-btn {
        min-width: 70px;
        padding: 6px 12px;
        font-size: 13px;
      }

      .header {
        padding: 10px 12px;
      }

      .chat-title {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="flex items-center gap-3 mb-5">
        <div id="chat-sidebar-logo-shell" class="h-10 min-w-[40px] rounded-xl bg-primary text-white flex items-center justify-center shadow-md shadow-primary/20 flex-shrink-0 overflow-hidden" style="padding:6px 8px;max-width:120px;">
          <span id="chat-sidebar-logo-fallback" class="material-symbols-outlined text-[16px]">smart_toy</span>
          <img id="chat-sidebar-logo-image" alt="企业LOGO" style="display:none;height:100%;width:auto;max-width:108px;object-fit:contain;">
        </div>
        <div class="min-w-0">
          <div id="chat-title" class="text-base font-black text-textMain truncate">企业知识库 Agent</div>
          <div id="chat-tagline" class="text-[11px] text-textMuted truncate">连接私有知识、流程文档与实时资讯</div>

      <button type="button" id="new-chat-btn" onclick="startNewChat()" class="w-full rounded-2xl border border-line bg-white px-4 py-3 text-sm font-bold text-textMain shadow-sm hover:bg-slate-50 transition flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[18px]">add_comment</span>
        <span>开启新对话</span>
      </button>
      <div class="mt-5">
        <div class="text-[11px] font-black tracking-widest text-textMuted uppercase px-1 mb-3">会话历史</div>
        <div id="session-list" class="space-y-1"></div>
      </div>
      <div class="sidebar-bottom">
        <button type="button" class="sidebar-logout" onclick="doLogout()">
          <span class="material-symbols-outlined text-[18px]">logout</span>
          <span>退出登录</span>
        </button>
      </div>
    </aside>

    <div class="main-content flex flex-col">
      <div id="chat-screen" class="shell h-screen flex flex-col overflow-hidden bg-white">
        <header class="border-b border-line px-6 py-3 flex items-center justify-between">
          <div class="flex items-center gap-3 min-w-0">
            <button type="button" class="md:hidden inline-flex h-9 w-9 items-center justify-center rounded-lg border border-line text-textMuted" onclick="toggleSidebar()">
              <span class="material-symbols-outlined text-[18px]">menu</span>
            </button>
            <div class="min-w-0">
              <h1 id="chat-title-main" class="text-sm font-bold text-textMain truncate">企业知识库 Agent</h1>
              <p id="chat-session-subtitle" class="text-[11px] text-textMuted truncate">新对话</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
          </div>
        </header>

        <main class="flex-1 flex flex-col relative min-h-0">
          <div id="agent-switcher-bar" class="hidden border-b border-line bg-[color:var(--primary-soft)]/35 px-6 py-3">
            <div class="max-w-2xl mx-auto flex flex-col md:flex-row md:items-center gap-3 md:justify-between">
              <div class="min-w-0">
                <div class="text-[11px] font-black uppercase tracking-widest text-textMuted">当前智能体</div>
                <div id="active-agent-summary" class="text-sm font-bold text-textMain truncate">未指定</div>
              </div>
              <div class="flex items-center gap-3">
                <select id="agent-switcher-select" class="min-w-[220px] rounded-xl border border-line bg-white px-4 py-2 text-sm font-semibold text-textMain" onchange="switchAgentBySelect()">
                  <option value="">默认智能体</option>
                </select>
              </div>

            <div class="max-w-2xl mx-auto">
              <div class="bg-gray-50 rounded-xl p-4">
                <div class="flex items-start gap-3">
                  <div id="welcome-avatar" class="h-8 w-8 rounded-full flex items-center justify-center flex-shrink-0 overflow-hidden" style="background:var(--primary-soft);color:var(--primary);">
                    <span id="welcome-avatar-fallback" class="material-symbols-outlined text-[16px]">smart_toy</span>
                    <img id="welcome-avatar-image" alt="企业LOGO" style="display:none;width:100%;height:100%;object-fit:contain;background:#fff;padding:3px;">
                  </div>
                  <div class="flex-1">
                    <h2 id="welcome-heading" class="text-base font-bold text-textMain mb-2">你好，今天我能帮你什么？</h2>
                    <p id="welcome-message" class="text-sm text-textMuted leading-relaxed mb-2">
                      你好，欢迎来到你的专属知识助理。你可以直接问制度、SOP、产品资料、操作手册或最新公告。
                    </p>
                    <div id="recommended-questions" class="flex flex-wrap gap-2"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="border-t border-line p-4">
            <div class="max-w-2xl mx-auto">
              <div class="composer-card bg-white border border-line rounded-xl shadow-sm p-2">
                <textarea id="chat-input" placeholder="输入你的问题..." class="w-full min-h-[40px] max-h-48 p-4 text-sm font-medium bg-transparent border-none focus:ring-0 resize-none" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <div class="flex items-center justify-between px-4 py-2 gap-3">
                  <div class="text-[11px] text-textMuted">Enter 发送，Shift + Enter 换行</div>
                  <button id="send-btn" onclick="sendMessage()" class="send-btn h-9 px-6 bg-primary hover:bg-primaryDeep text-white text-xs font-bold rounded-full shadow shadow-primary/20 transition-all flex items-center gap-1">
                    <span class="material-symbols-outlined text-[16px]">send</span>
                    <span id="send-btn-text">发送问题</span>
                  </button>

  </div>

  <div id="custom-modal" class="modal-backdrop">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title" class="modal-title">提示</h3>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <input id="modal-input" class="modal-input hidden" type="text" autocomplete="off">
      <div class="modal-footer">
        <button id="modal-cancel-btn" class="modal-btn btn-cancel">取消</button>
        <button id="modal-ok-btn" class="modal-btn btn-ok">确定</button>
      </div>
    </div>
  </div>

  <script>
    let authPassword = localStorage.getItem('auth_password') || '';
    let authPhone = localStorage.getItem('auth_phone') || '';
    let userBalance = 0;
    let isStreaming = false;
    let currentChatLogo = '';
    let sessionList = [];
    let currentAppConfig = {};
    let currentAgentId = new URLSearchParams(window.location.search).get('agent_id') || '';
    let currentAgentMeta = null;
    let availableAgents = [];
    let currentSessionId = '';
    const initialWelcomeMarkup = document.getElementById('chat-messages').innerHTML;

    marked.setOptions({ breaks: true, gfm: true });

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function sanitizeAiMessage(text) {
      const raw = String(text || '').trim();
      if (!raw) return raw;
      if (raw.startsWith('[LLM错误:') || raw.startsWith('[连接错误]') || raw.startsWith('[超时]')) {
        return '服务暂时繁忙，我正在切换备用线路，请稍后再试。';
      }
      return raw;
    }

    function hexToRgb(hex) {
      // Remove # if present
      hex = hex.replace(/^#/, '');
      
      // Convert 3-digit hex to 6-digits.
      if (hex.length === 3) {
        hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
      }
      
      // Convert hex to RGB
      const r = parseInt(hex.substring(0, 2), 16);
      const g = parseInt(hex.substring(2, 4), 16);
      const b = parseInt(hex.substring(4, 6), 16);
      
      return `${r}, ${g}, ${b}`;
    }
    
    function applyChatTheme(theme = {}) {
      const primary = theme.primary || '#10b981';
      const primaryDeep = theme.primary_deep || '#059669';
      const primarySoft = theme.primary_soft || '#ecfdf5';

      document.documentElement.style.setProperty('--primary', primary);
      document.documentElement.style.setProperty('--primary-deep', primaryDeep);
      document.documentElement.style.setProperty('--primaryDeep', primaryDeep);
      document.documentElement.style.setProperty('--primary-soft', primarySoft);

      const map = {
        bg: '--bg',
        surface: '--surface',
        surface_strong: '--surface-strong',
        line: '--line',
        text: '--text',
        muted: '--muted',
        danger: '--danger'
      };
      Object.entries(map).forEach(([key, cssVar]) => {
        if (theme[key]) document.documentElement.style.setProperty(cssVar, theme[key]);
      });

      const logoShell = document.getElementById('chat-sidebar-logo-shell');
      const logoImage = document.getElementById('chat-sidebar-logo-image');
      if (logoShell && !(logoImage && logoImage.style.display === 'block' && logoImage.src)) {
        logoShell.style.background = primary;
        logoShell.style.boxShadow = `0 8px 18px rgba(${hexToRgb(primary)}, 0.24)`;
      }

      const welcomeAvatar = document.getElementById('welcome-avatar');
      if (welcomeAvatar) {
        welcomeAvatar.style.background = primarySoft;
        welcomeAvatar.style.color = primary;
      }

      const buttons = document.querySelectorAll('.send-btn, .primary-btn, .btn-ok');
      buttons.forEach(btn => {
        btn.style.backgroundColor = primary;
        btn.style.boxShadow = `0 4px 12px rgba(${hexToRgb(primary)}, 0.2)`;
        btn.onmouseover = function() { this.style.backgroundColor = primaryDeep; };
        btn.onmouseout = function() { this.style.backgroundColor = primary; };
      });

      const questionButtons = document.querySelectorAll('.question-chip');
      questionButtons.forEach(btn => {
        btn.style.borderColor = `rgba(${hexToRgb(primary)}, 0.20)`;
        btn.style.backgroundColor = `rgba(${hexToRgb(primary)}, 0.08)`;
        btn.style.color = primary;
        btn.onmouseover = function() {
          this.style.backgroundColor = `rgba(${hexToRgb(primary)}, 0.14)`;
          this.style.borderColor = `rgba(${hexToRgb(primary)}, 0.34)`;
        };
        btn.onmouseout = function() {
          this.style.backgroundColor = `rgba(${hexToRgb(primary)}, 0.08)`;
          this.style.borderColor = `rgba(${hexToRgb(primary)}, 0.20)`;
        };
      });

      const composerCard = document.querySelector('.composer-card');
      const inputEl = document.getElementById('chat-input');
      if (inputEl && composerCard) {
        inputEl.onfocus = function() {
          composerCard.style.borderColor = primary;
          composerCard.style.boxShadow = `0 0 0 4px rgba(${hexToRgb(primary)}, 0.10)`;
        };
        inputEl.onblur = function() {
          composerCard.style.borderColor = '';
          composerCard.style.boxShadow = '';
        };
      }
    }

    function applyChatBranding(config = {}) {
      const { logo, app_name, app_subtitle, chat_title, chat_tagline, welcome_message, agent_description } = config;
      currentChatLogo = logo || '';

      const fallbackEl = document.getElementById('chat-sidebar-logo-fallback');
      const imageEl = document.getElementById('chat-sidebar-logo-image');
      const shellEl = document.getElementById('chat-sidebar-logo-shell');
      if (fallbackEl && imageEl && shellEl) {
        if (logo) {
          imageEl.src = logo;
          imageEl.style.display = 'block';
          fallbackEl.style.display = 'none';
          shellEl.style.background = 'transparent';
          shellEl.style.padding = '0';
          shellEl.style.boxShadow = 'none';
          // 动态调整容器宽度以适应不同比例的logo
          imageEl.onload = function() {
            const imgRatio = this.naturalWidth / this.naturalHeight;
            if (imgRatio > 1.5) {
              // 长logo (横向)
              shellEl.style.minWidth = Math.min(108, Math.max(60, 40 * imgRatio)) + 'px';
              shellEl.style.borderRadius = '8px';
            } else {
              // 正方形或竖向logo
              shellEl.style.minWidth = '40px';
              shellEl.style.borderRadius = '12px';
            }
          };
          imageEl.onerror = function() {
            // 加载失败时回退到默认状态
            imageEl.style.display = 'none';
            fallbackEl.style.display = 'inline-flex';
            shellEl.style.background = 'var(--primary)';
            shellEl.style.minWidth = '40px';
            shellEl.style.width = '40px';
            shellEl.style.borderRadius = '12px';
            shellEl.style.padding = '6px 8px';
          };
        } else {
          imageEl.src = '';
          imageEl.style.display = 'none';
          fallbackEl.style.display = 'inline-flex';
          shellEl.style.background = 'var(--primary)';
          shellEl.style.padding = '6px 8px';
          shellEl.style.minWidth = '40px';
          shellEl.style.width = '40px';
          shellEl.style.height = '40px';
          shellEl.style.borderRadius = '12px';
          shellEl.style.boxShadow = `0 8px 18px rgba(${hexToRgb(getComputedStyle(document.documentElement).getPropertyValue('--primary').trim() || '#10b981')}, 0.24)`;
        }
      }

      const welcomeAvatarEl = document.getElementById('welcome-avatar');
      if (welcomeAvatarEl) {
        if (logo) {
          welcomeAvatarEl.style.background = '#ffffff';
          welcomeAvatarEl.innerHTML = `<img src="${logo}" alt="企业LOGO" style="width:100%;height:100%;object-fit:contain;background:#fff;padding:3px;">`;
        } else {
          welcomeAvatarEl.style.background = 'var(--primary-soft)';
          welcomeAvatarEl.style.color = 'var(--primary)';
          welcomeAvatarEl.innerHTML = '<span class="material-symbols-outlined text-[16px]">smart_toy</span>';
        }
      }

      const chatTitleEl = document.getElementById('chat-title');
      const chatTitleMainEl = document.getElementById('chat-title-main');
      const chatTaglineEl = document.getElementById('chat-tagline');
      const welcomeHeadingEl = document.getElementById('welcome-heading');
      const welcomeMessageEl = document.getElementById('welcome-message');

      if (chatTitleEl) chatTitleEl.textContent = app_name || chat_title || '企业知识库 Agent';
      if (chatTitleMainEl) chatTitleMainEl.textContent = app_name || chat_title || '企业知识库 Agent';
      if (chatTaglineEl) chatTaglineEl.textContent = app_subtitle || chat_tagline || '连接私有知识、流程文档与实时资讯';
      if (welcomeHeadingEl) welcomeHeadingEl.textContent = chat_title || '你好，今天我能帮你什么？';
      if (welcomeMessageEl) welcomeMessageEl.textContent = welcome_message || '你好，欢迎来到你的专属知识助理。你可以直接问制度、SOP、产品资料、操作手册或最新公告。';
    }

    function renderRecommendedQuestions(questions = []) {
      const root = document.getElementById('recommended-questions');
      if (!root) return;
      const list = Array.isArray(questions) ? questions.filter(Boolean).slice(0, 8) : [];
      if (!list.length) {
        root.innerHTML = '<div class="text-textMuted" style="font-size:13px;padding:8px 2px;text-align:center;">当前还没有推荐问题</div>';
        return;
      }
      root.innerHTML = list.map(item => (
        `<button type="button" class="question-chip" onclick="sendRecommendedQuestion(${JSON.stringify(item).replace(/"/g, '&quot;')})">${escapeHtml(item)}</button>`
      )).join('');
    }

    function sendRecommendedQuestion(text) {
      const input = document.getElementById('chat-input');
      const messagesRoot = document.getElementById('chat-messages');
      if (!input) return;
      if (messagesRoot && messagesRoot.querySelector('#welcome-card')) {
        messagesRoot.innerHTML = '';
      }
      input.value = text || '';
      input.focus();
      // 自动发送
      setTimeout(() => sendMessage(), 100);
    }

    async function loadAppConfig() {
      try {
        const params = new URLSearchParams();
        if (authPhone) params.set('phone', authPhone);
        if (currentAgentId) params.set('agent_id', currentAgentId);
        const query = params.toString() ? `?${params.toString()}` : '';
        const res = await fetch(`/api/public/tenant-app-config${query}`);
        const data = await res.json();
        console.log('App config response:', data);
        if (!data.ok || !data.config) {
          console.error('Invalid app config response:', data);
          return;
        }
        const cfg = data.config;
        currentAgentMeta = data.agent || null;
        currentAppConfig = cfg || {};
        console.log('Loaded app config:', cfg);
        
        // Update page title
        document.title = cfg.app_name ? `${cfg.app_name} · 前台聊天页 V2` : document.title;
        
        // Apply branding
        applyChatBranding(cfg);
        
        // Apply theme
        applyChatTheme(cfg.theme || {});
        
        // Update input and button text
        const inputEl = document.getElementById('chat-input');
        const sendBtnTextEl = document.getElementById('send-btn-text');

        if (inputEl) inputEl.placeholder = cfg.input_placeholder || '输入你的问题...';
        if (sendBtnTextEl) sendBtnTextEl.textContent = cfg.send_button_text || '发送问题';

        // Render recommended questions
        renderRecommendedQuestions(cfg.recommended_questions || []);
      } catch (error) {
        console.error('Failed to load app config:', error);
      }
    }

    function persistCurrentSession(sessionId) {
      currentSessionId = String(sessionId || '').trim();
      const storageKey = currentAgentId ? `chat_current_session_id::${currentAgentId}` : 'chat_current_session_id';
      if (currentSessionId) {
        localStorage.setItem(storageKey, currentSessionId);
      } else {
        localStorage.removeItem(storageKey);
      }
    }

    function hydrateCurrentSessionFromStorage() {
      const storageKey = currentAgentId ? `chat_current_session_id::${currentAgentId}` : 'chat_current_session_id';
      currentSessionId = localStorage.getItem(storageKey) || '';
    }

    function updateSessionSubtitle() {
      const current = sessionList.find(item => item.session_id === currentSessionId);
      const subtitleEl = document.getElementById('chat-session-subtitle');
      if (subtitleEl) {
        subtitleEl.textContent = current ? (current.title || '新对话') : '新对话';
      }
    }

    function formatSessionTime(text) {
      const raw = String(text || '').trim();
      if (!raw) return '刚刚';
      const date = new Date(raw.replace(' ', 'T'));
      if (Number.isNaN(date.getTime())) return raw;
      return new Intl.DateTimeFormat('zh-CN', {
        month: 'numeric',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    }

    function sessionGroupLabel(text) {
      const raw = String(text || '').trim();
      const date = raw ? new Date(raw.replace(' ', 'T')) : null;
      if (!date || Number.isNaN(date.getTime())) return '更早';
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const startOfDate = new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
      const diffDays = Math.floor((startOfToday - startOfDate) / 86400000);
      if (diffDays <= 0) return '今天';
      if (diffDays === 1) return '昨天';
      if (diffDays < 7) return '7 天内';
      return '更早';
    }

    function renderSessionList() {
      const root = document.getElementById('session-list');
      if (!root) return;
      if (!sessionList.length) {
        root.innerHTML = (!currentAgentId && Array.isArray(availableAgents) && availableAgents.length > 1)
          ? '<div class="px-2 py-6 text-center text-[12px] text-textMuted">先选择一个智能体，再查看它的会话历史</div>'
          : '<div class="px-2 py-6 text-center text-[12px] text-textMuted">还没有历史会话</div>';
        updateSessionSubtitle();
        return;
      }
      const grouped = new Map();
      sessionList.forEach(item => {
        const label = sessionGroupLabel(item.updated_at || item.created_at);
        if (!grouped.has(label)) grouped.set(label, []);
        grouped.get(label).push(item);
      });
      root.innerHTML = Array.from(grouped.entries()).map(([label, items]) => `
        <div class="session-group">
          <div class="session-group-label">${escapeHtml(label)}</div>
          <div class="space-y-1">
            ${items.map(item => `
              <button type="button" class="session-item ${item.session_id === currentSessionId ? 'active' : ''}" onclick="openSession('${escapeHtml(item.session_id)}')">
                <div class="session-item-title">${escapeHtml(item.title || '新对话')}</div>
                <div class="session-item-time">${escapeHtml(formatSessionTime(item.updated_at || item.created_at))}</div>
              </button>
            `).join('')}
          </div>
        </div>
      `).join('');
      updateSessionSubtitle();
    }

    function renderChatMessagesFromSession(messages = []) {
      const root = document.getElementById('chat-messages');
      if (!root) return;
      if (!Array.isArray(messages) || !messages.length) {
        if (!currentAgentId && Array.isArray(availableAgents) && availableAgents.length > 1) {
          renderAgentPortal();
          return;
        }
        root.innerHTML = initialWelcomeMarkup;
        applyChatBranding(currentAppConfig || {});
        renderRecommendedQuestions((currentAppConfig || {}).recommended_questions || []);
        return;
      }
      root.innerHTML = '';
      messages.forEach(item => {
        appendMessage('user', item.question || '');
        appendMessage('assistant', marked.parse(sanitizeAiMessage(item.answer || '')));
      });
      root.scrollTop = root.scrollHeight;
    }

    function clearWelcomeState() {
      const messagesRoot = document.getElementById('chat-messages');
      if (messagesRoot && messagesRoot.querySelector('#welcome-card')) {
        messagesRoot.innerHTML = '';
      }
    }

    function renderAgentPortal() {
      const root = document.getElementById('chat-messages');
      if (!root) return;
      root.innerHTML = `
        <div class="agent-portal">
          <div class="empty-panel" style="max-width:100%;margin:0;border-radius:24px;background:linear-gradient(180deg,#ffffff 0%, color-mix(in srgb, var(--primary-soft) 28%, white) 100%);">
            <div class="agent-portal-badge">
              <span class="material-symbols-outlined text-[14px]">hub</span>
              智能体中心
            </div>
            <h2 style="margin-top:16px;">请选择要进入的智能体</h2>
            <p>同一机构下可以维护多个业务智能体。不同智能体可绑定不同知识范围、工作流和外部工具，更适合医院、政企和集团场景。</p>
            <div class="agent-portal-grid">
              ${availableAgents.map((agent) => `
                <button type="button" class="agent-portal-card" onclick="switchAgentByCard('${escapeHtml(agent.agent_id || '')}')">
                  <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                      <div class="text-lg font-black text-textMain truncate">${escapeHtml(agent.name || agent.agent_id || '未命名智能体')}</div>
                      <div class="text-xs text-textMuted mt-1">${escapeHtml(agent.agent_id || '')}</div>
                    </div>
                    ${agent.is_default ? '<span class="agent-portal-badge">默认</span>' : ''}
                  </div>
                  <div class="text-sm text-textMuted leading-relaxed mt-4">${escapeHtml(agent.description || '进入该智能体后，将加载它对应的知识、工作流与欢迎语。')}</div>
                </button>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    async function fetchSessionList() {
      if (!currentAgentId && Array.isArray(availableAgents) && availableAgents.length > 1) {
        sessionList = [];
        renderSessionList();
        return sessionList;
      }
      const res = await fetch('/api/chat/sessions/list', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: authPhone, password: authPassword, agent_id: currentAgentId })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.msg || '加载会话失败');
      sessionList = Array.isArray(data.sessions) ? data.sessions : [];
      renderSessionList();
      return sessionList;
    }

    function renderAgentSwitcher() {
      const bar = document.getElementById('agent-switcher-bar');
      const select = document.getElementById('agent-switcher-select');
      const summary = document.getElementById('active-agent-summary');
      if (!bar || !select || !summary) return;
      if (!availableAgents.length) {
        bar.classList.add('hidden');
        return;
      }
      bar.classList.remove('hidden');
      const baseOptions = (!currentAgentId && availableAgents.length > 1)
        ? ['<option value="">请选择智能体</option>']
        : [];
      select.innerHTML = baseOptions.concat(availableAgents.map(item => (
        `<option value="${escapeHtml(item.agent_id || '')}">${escapeHtml(item.name || item.agent_id || '未命名智能体')}${item.is_default ? '（默认）' : ''}</option>`
      ))).join('');
      if (currentAgentId && availableAgents.some(item => item.agent_id === currentAgentId)) {
        select.value = currentAgentId;
      } else if (currentAgentMeta?.agent_id && availableAgents.some(item => item.agent_id === currentAgentMeta.agent_id)) {
        select.value = currentAgentMeta.agent_id;
      } else if (!currentAgentId && availableAgents.length > 1) {
        select.value = '';
      }
      const active = currentAgentId
        ? (availableAgents.find(item => item.agent_id === (select.value || currentAgentId)) || currentAgentMeta || availableAgents[0])
        : null;
      if (active) {
        summary.textContent = `${active.name || active.agent_id}${active.description ? ` · ${active.description}` : ''}`;
      } else {
        summary.textContent = '请选择一个智能体进入';
      }
    }

    async function loadAvailableAgents() {
      if (!authPhone || !authPassword) return;
      try {
        const res = await fetch('/api/chat/agents', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: authPhone, password: authPassword, agent_id: currentAgentId })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) return;
        availableAgents = Array.isArray(data.items) ? data.items : [];
        if (data.active_agent?.agent_id) {
          currentAgentMeta = data.active_agent;
          if (!currentAgentId && availableAgents.length <= 1) {
            currentAgentId = data.active_agent.agent_id;
            const next = new URL(window.location.href);
            next.searchParams.set('agent_id', currentAgentId);
            history.replaceState(null, '', next.toString());
          }
        }
        hydrateCurrentSessionFromStorage();
        renderAgentSwitcher();
      } catch (error) {
        console.error('Failed to load agents:', error);
      }
    }

    function switchAgentBySelect() {
      const select = document.getElementById('agent-switcher-select');
      const nextAgentId = String(select?.value || '').trim();
      const next = new URL(window.location.href);
      if (nextAgentId) {
        next.searchParams.set('agent_id', nextAgentId);
      } else {
        next.searchParams.delete('agent_id');
      }
      next.pathname = '/chat';
      window.location.href = next.toString();
    }

    function switchAgentByCard(agentId) {
      const next = new URL(window.location.href);
      if (agentId) {
        next.searchParams.set('agent_id', agentId);
      } else {
        next.searchParams.delete('agent_id');
      }
      next.pathname = '/chat';
      window.location.href = next.toString();
    }

    async function createNewSession(title = '新对话') {
      if (!currentAgentId && Array.isArray(availableAgents) && availableAgents.length > 1) {
        await showModal({ title: '请选择智能体', body: '请先从上方智能体列表中选择一个业务智能体，再开始新对话。', okOnly: true });
        return null;
      }
      const res = await fetch('/api/chat/sessions/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: authPhone, password: authPassword, title, agent_id: currentAgentId })
      });
      const data = await res.json();
      if (!res.ok || !data.ok || !data.session) throw new Error(data.msg || '创建会话失败');
      return data.session;
    }

    async function loadSessionMessages(sessionId) {
      const res = await fetch('/api/chat/sessions/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: authPhone, password: authPassword, session_id: sessionId, agent_id: currentAgentId })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.msg || '加载会话消息失败');
      renderChatMessagesFromSession(data.messages || []);
    }

    async function openSession(sessionId) {
      const nextId = String(sessionId || '').trim();
      if (!nextId) return;
      persistCurrentSession(nextId);
      renderSessionList();
      await loadSessionMessages(nextId);
      const sidebar = document.getElementById('sidebar');
      if (window.innerWidth <= 768 && sidebar) sidebar.classList.remove('active');
    }

    async function startNewChat() {
      if (isStreaming) return;
      if (!currentAgentId && Array.isArray(availableAgents) && availableAgents.length > 1) {
        renderAgentPortal();
        return;
      }
      try {
        if (currentSessionId) {
          const currentMessages = await fetch('/api/chat/sessions/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: authPhone, password: authPassword, session_id: currentSessionId, agent_id: currentAgentId })
          }).then(r => r.json()).catch(() => ({ ok: false }));
          if (currentMessages.ok && Array.isArray(currentMessages.messages) && currentMessages.messages.length === 0) {
            renderChatMessagesFromSession([]);
            document.getElementById('chat-input')?.focus();
            return;
          }
        }
        const session = await createNewSession('新对话');
        if (!session) return;
        persistCurrentSession(session.session_id || '');
        await fetchSessionList();
        renderChatMessagesFromSession([]);
        document.getElementById('chat-input')?.focus();
      } catch (error) {
        await showModal({ title: '创建失败', body: error.message || '暂时无法创建新会话', okOnly: true });
      }
    }

    function doLogout() {
      localStorage.removeItem('auth_password');
      localStorage.removeItem('auth_phone');
      localStorage.removeItem('chat_current_session_id');
      authPassword = '';
      authPhone = '';
      window.location.href = currentAgentId ? `/login?agent_id=${encodeURIComponent(currentAgentId)}` : '/login';
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar) {
        sidebar.classList.toggle('active');
      }
    }

    function showModal({ title, body, showInput = false, placeholder = '', okOnly = false, okText = '确定', cancelText = '取消' }) {
      return new Promise((resolve) => {
        const modal = document.getElementById('custom-modal');
        const titleEl = document.getElementById('modal-title');
        const bodyEl = document.getElementById('modal-body');
        const inputEl = document.getElementById('modal-input');
        const okBtn = document.getElementById('modal-ok-btn');
        const cancelBtn = document.getElementById('modal-cancel-btn');

        titleEl.textContent = title || '提示';
        bodyEl.textContent = body || '';
        inputEl.classList.toggle('hidden', !showInput);
        if (showInput) {
          inputEl.value = '';
          inputEl.placeholder = placeholder;
        }
        cancelBtn.classList.toggle('hidden', okOnly);
        okBtn.textContent = okText;
        cancelBtn.textContent = cancelText;

        const close = (res) => {
          modal.classList.remove('active');
          resolve(res);
        };

        modal.classList.add('active');
        if (showInput) setTimeout(() => inputEl.focus(), 100);

        okBtn.onclick = () => close(showInput ? inputEl.value : true);
        cancelBtn.onclick = () => close(showInput ? null : false);
        modal.onclick = (e) => { if (e.target === modal && !okOnly) close(showInput ? null : false); };
      });
    }



    function appendMessage(role, html) {
      const container = document.getElementById('chat-messages');
      const row = document.createElement('div');
      row.className = `message-row ${role === 'user' ? 'user' : 'assistant'}`;
      if (role === 'user') {
        row.innerHTML = `<div class="avatar">你</div><div class="bubble">${escapeHtml(html)}</div>`;
      } else {
        row.innerHTML = `<div class="avatar">${currentChatLogo ? `<img src="${currentChatLogo}" alt="企业LOGO" style="width:100%;height:100%;object-fit:contain;background:#fff;padding:3px;">` : 'AI'}</div><div class="bubble prose"><span class="ai-content">${html}</span></div>`;
      }
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return row;
    }

    function createStreamingMessage() {
      const container = document.getElementById('chat-messages');
      const row = document.createElement('div');
      row.className = 'message-row assistant';
      row.innerHTML = `
        <div class="avatar">${currentChatLogo ? `<img src="${currentChatLogo}" alt="企业LOGO" style="width:100%;height:100%;object-fit:contain;background:#fff;padding:3px;">` : 'AI'}</div>
        <div class="bubble prose">
          <div class="ai-status"></div>
          <span class="ai-content"><span class="typing"><span></span><span></span><span></span></span></span>
        </div>
      `;
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return {
        statusEl: row.querySelector('.ai-status'),
        contentEl: row.querySelector('.ai-content')
      };
    }

    function showQueueStatus(statusEl, position) {
      statusEl.innerHTML = `<div class="status-text">AI 正在排队计算中，前方 ${position || 1} 人...</div>`;
    }

    async function sendMessage() {
      if (isStreaming) return;
      if (!currentAgentId && Array.isArray(availableAgents) && availableAgents.length > 1) {
        renderAgentPortal();
        await showModal({ title: '请选择智能体', body: '请先选择要进入的智能体，再开始提问。', okOnly: true });
        return;
      }
      const input = document.getElementById('chat-input');
      const question = input.value.trim();
      if (!question) return;
      if (!currentSessionId) {
        const session = await createNewSession(question || '新对话');
        persistCurrentSession(session.session_id || '');
        await fetchSessionList();
        renderChatMessagesFromSession([]);
      }

      clearWelcomeState();

      input.value = '';
      appendMessage('user', question);

      isStreaming = true;
      const btn = document.getElementById('send-btn');
      btn.disabled = true;

      const { statusEl, contentEl } = createStreamingMessage();
      let fullText = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: authPassword, phone: authPhone, question, session_id: currentSessionId, agent_id: currentAgentId })
        });

        if (res.status === 403) {
          let errMsg = '账号校验失败';
          try { const err = await res.json(); errMsg = err.msg || errMsg; } catch (error) {}
          contentEl.innerHTML = `<p class="error-text">${escapeHtml(errMsg)}</p>`;
          statusEl.innerHTML = '';
          isStreaming = false;
          btn.disabled = false;
          return;
        }
        if (res.status === 429) {
          contentEl.innerHTML = '<p class="error-text">请求过于频繁，每 10 秒仅可提问 1 次，请稍后再试。</p>';
          statusEl.innerHTML = '';
          isStreaming = false;
          btn.disabled = false;
          return;
        }
        if (!res.ok) {
          let errMsg = '请求失败';
          try { const err = await res.json(); errMsg = err.msg || errMsg; } catch (error) {}
          contentEl.innerHTML = `<p class="error-text">${escapeHtml(errMsg)}</p>`;
          statusEl.innerHTML = '';
          isStreaming = false;
          btn.disabled = false;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6);
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);
              if (parsed.status === 'queued') {
                showQueueStatus(statusEl, parsed.position || 1);
                continue;
              }
              if (parsed.session_id) {
                persistCurrentSession(parsed.session_id);
              }
              if (parsed.status === 'generating') {
                statusEl.innerHTML = '';
                continue;
              }
              if (parsed.status === 'cache_hit') {
                statusEl.innerHTML = '<span class="cache-badge">闪电回复</span>';
                continue;
              }
              if (parsed.status === 'degrading') {
                statusEl.innerHTML = '<div class="status-text">服务繁忙，正在切换备用引擎...</div>';
                continue;
              }
              if (parsed.content) {
                fullText += sanitizeAiMessage(parsed.content);
                contentEl.innerHTML = marked.parse(fullText);
                document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
              }
            } catch (error) {}
          }
        }
      } catch (error) {
        contentEl.innerHTML = '<p class="error-text">网络错误，请检查连接后重试。</p>';
        statusEl.innerHTML = '';
      }

      if (!fullText) {
        contentEl.innerHTML = '<p class="muted">未收到回复</p>';
        statusEl.innerHTML = '';
      }
      isStreaming = false;
      btn.disabled = false;
      await fetchSessionList();
      input.focus();
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => document.body.classList.add('icons-ready'));
    } else {
      document.body.classList.add('icons-ready');
    }

    (async function init() {
      hydrateCurrentSessionFromStorage();
      await loadAppConfig();
      if (!authPassword || !authPhone) {
        window.location.href = currentAgentId ? `/login?agent_id=${encodeURIComponent(currentAgentId)}` : '/login';
        return;
      }
      fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: authPassword, phone: authPhone })
      }).then(async (r) => r.json()).then(async (data) => {
        if (data.ok) {
          await loadAvailableAgents();
          await fetchSessionList();
          const currentExists = sessionList.some(item => item.session_id === currentSessionId);
          if (!currentAgentId && Array.isArray(availableAgents) && availableAgents.length > 1) {
            persistCurrentSession('');
            renderSessionList();
            renderAgentPortal();
          } else if (currentSessionId && currentExists) {
            await openSession(currentSessionId);
          } else if (sessionList.length) {
            await openSession(sessionList[0].session_id);
          } else {
            persistCurrentSession('');
            renderSessionList();
            renderChatMessagesFromSession([]);
          }
          document.getElementById('chat-input').focus();
        } else {
          localStorage.removeItem('auth_password');
          localStorage.removeItem('auth_phone');
          localStorage.removeItem('chat_current_session_id');
          authPassword = '';
          authPhone = '';
          window.location.href = currentAgentId ? `/login?agent_id=${encodeURIComponent(currentAgentId)}` : '/login';
        }
      }).catch(() => {
        window.location.href = currentAgentId ? `/login?agent_id=${encodeURIComponent(currentAgentId)}` : '/login';
      });
    })();
  </script>
